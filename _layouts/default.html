<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="Suckling home">
          <img src="{{ '/assets/img/suckling-logo.svg' | relative_url }}" alt="Suckling logo">
        </a>

        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/COMMANDS.html' | relative_url }}">Commands</a>
          <a href="{{ '/CHANGELOG.html' | relative_url }}">Changelog</a>
        </nav>
      </header>

      <main class="content-card">
        {{ content }}
      </main>

      <footer class="site-footer">
        <span>Suckling · built for Return by 9</span>
      </footer>
    </div>
  </body>
</html>
